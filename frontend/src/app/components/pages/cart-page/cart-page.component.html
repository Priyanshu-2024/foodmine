<div *ngIf="Cart && Cart.items.length" class="container">
  <div class="row">
    <ul class="col-lg-6 col-md-12">
      <li *ngFor="let cartItem of Cart.items">
        <div>
          <img [src]="cartItem.foods.imageUrl" [alt]="cartItem.foods.name">
        </div>
        <div>
          <a class="name" routerLink="/food/{{cartItem.foods.id}}">
          {{cartItem.foods.name}}
          </a>
        </div>
        <div>
          <select  class="select" #quantitySelect
          [value]="cartItem.quantity"
          (change)="changeQuantity(cartItem, quantitySelect.value)">
          <option>1</option>
          <option>2</option>
          <option>3</option>
          <option>4</option>
          <option>5</option>
        </select>
        </div>
        <div class="price">
          {{cartItem.price | currency}}
        </div>
    
        <div>
          <button class="remove-button mx-auto" (click)="removeCart(cartItem)">
            Remove
          </button>
        </div>
      </li>
    </ul>
    <div class="checkout col-lg-6 col-md-12">
      <div>
        <div class="foods-count">{{Cart.totalcount}}</div>
        <div class="total-price">{{Cart.totalPrice|currency}}</div>
      </div>
    
      <a routerLink="/checkout">Proceed to Checkout</a>
    </div>
  </div>
    
    </div>
